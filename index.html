<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Bakery Beats | Exclusive Vault</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0c10;
  color:#f5f5f5;
}

header{
  text-align:center;
  padding:90px 20px;
  background:linear-gradient(135deg,#141622,#1f2233,#0f111a);
}

header h1{
  font-size:48px;
  margin-bottom:10px;
}

header p{
  color:#aaa;
  max-width:750px;
  margin:auto;
}

.section{
  padding:60px 20px;
  max-width:1500px;
  margin:auto;
}

.beat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

@media(max-width:1200px){
  .beat-grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:900px){
  .beat-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .beat-grid{grid-template-columns:1fr;}
}

.beat-card{
  background:#15161d;
  padding:18px;
  border-radius:14px;
  box-shadow:0 0 18px rgba(0,0,0,0.6);
}

.badge{
  background:#ff3d3d;
  display:inline-block;
  padding:4px 8px;
  border-radius:8px;
  font-size:10px;
  font-weight:bold;
  margin-bottom:8px;
}

iframe{
  border-radius:8px;
  margin:8px 0;
}

.button{
  display:block;
  text-align:center;
  padding:9px;
  border-radius:6px;
  background:#2d2f3a;
  color:#fff;
  text-decoration:none;
  font-size:13px;
  margin-top:6px;
  transition:0.2s;
}

.button:hover{
  background:#44475a;
}

.note{
  margin-top:50px;
  font-size:13px;
  color:#888;
  line-height:1.6;
  text-align:center;
}

footer{
  text-align:center;
  padding:35px;
  color:#555;
}
</style>
</head>
